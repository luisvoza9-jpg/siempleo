<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siempleo - Tu futuro a un clic</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; margin: 0; }
        
        /* Fondo con movimiento para la portada */
        .hero { 
            background: linear-gradient(-45deg, #1e3a8a, #3b82f6, #1e40af, #60a5fa);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; text-align: center; padding: 4rem 2rem; 
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
        .logo span { color: var(--accent); }

        .search-container { 
            background: white; padding: 2rem; border-radius: 15px; 
            max-width: 900px; margin: -50px auto 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .filter-group { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .job-card { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .job-card h2 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .btn-view { background: #e5e7eb; color: #374151; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="logo">Si<span>empleo</span></h1>
        <p>Con Tu Trabajo Nunca Irás Cuesta Abajo</p>
    </div>

    <div class="search-container">
        <form class="filter-group" action="/" method="GET">
            <input type="text" name="q" placeholder="Buscar cargo..." value="{{ busqueda }}">
            
            <select name="pueblo">
                <option value="">Todas las ciudades</option>
                <option value="Mollet">Mollet del Vallès</option>
                <option value="Granollers">Granollers</option>
                <option value="Parets">Parets del Vallès</option>
                <option value="Montmelo">Montmeló</option>
            </select>

            <select name="sector">
                <option value="">Todos los sectores</option>
                <option value="Hosteleria">Hostelería</option>
                <option value="Logistica">Logística</option>
                <option value="Comercio">Comercio</option>
            </select>

            <button type="submit" class="btn-search">🔍</button>
        </form>
    </div>

    <div class="container">
        {% for oferta in ofertas %}
        <div class="job-card">
            <div>
                <h2>{{ oferta['Titulo Oferta'] }}</h2>
                <small>📍 {{ oferta['Localidad'] }} | 📅 {{ oferta['Fecha Captura'] }}</small>
            </div>
            <a href="/oferta/{{ oferta['slug'] }}" class="btn-view">Ver Detalles</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
