<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ oferta['Titulo Oferta'] }} - Siempleo</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    
    <style>
        :root { --primary: #1e3a8a; --accent: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; margin: 0; color: #374151; }
        
        .header { 
            background: #1e3a8a; color: white; padding: 1.5rem; text-align: center;
        }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        .card { 
            background: white; padding: 2rem; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid var(--accent);
        }
        
        h1 { color: var(--primary); margin-top: 0; font-size: 1.8rem; }
        .meta { display: flex; gap: 15px; font-size: 0.9rem; color: #6b7280; margin-bottom: 2rem; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
        .info-item b { display: block; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        
        .btn-apply { 
            display: block; width: 100%; background: #10b981; color: white; 
            text-align: center; padding: 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .btn-apply:hover { transform: scale(1.02); background: #059669; }
        
        .back-link { display: inline-block; margin-top: 2rem; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Si<span>empleo</span></h2>
    </div>

    <div class="container">
        <div class="card">
            <h1>{{ oferta['Titulo Oferta'] }}</h1>
            
            <div class="meta">
                <span>📍 {{ oferta['Localidad'] }}</span>
                <span>📅 Publicado: {{ oferta['Fecha Captura'] }}</span>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <b>Sector</b>
                    {{ oferta['Sector Padre'] }}
                </div>
                <div class="info-item">
                    <b>Puesto</b>
                    {{ oferta['Puesto Especifico'] }}
                </div>
                <div class="info-item">
                    <b>Plataforma</b>
                    {{ oferta['Plataforma'] }}
                </div>
            </div>

            <a href="{{ oferta['URL'] }}" target="_blank" class="btn-apply">
                Inscribirme en la oferta
            </a>
        </div>

        <a href="/" class="back-link">← Volver al buscador</a>
    </div>

</body>
</html>
